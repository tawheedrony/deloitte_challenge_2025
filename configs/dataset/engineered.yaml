# Dataset: wildfire_engineered
# Source : data/wildfire_engineered.csv
# Build  : python scripts/preprocess.py --engineered
# ZIPs   : 1906 | Years: 2018-2021
#
# Full EDA-faithful feature set (mirrors scripts/eda.py derivations),
# aggregated to one row per (ZIP, Year) from the raw three-way join.
#
# Available feature groups:
#   insurance   : loss_ratio, loss_per_exposure, claim_frequency, avg_loss_per_claim,
#                 cat_share, log_earned_premium, log_total_losses
#   risk        : avg_fire_risk_score, high_risk_pct, low_risk_pct, risk_concentration
#   weather     : avg_tmax_c, avg_tmin_c, tot_prcp_mm,
#                 temp_range, heat_index, drought_proxy, dry_hot, log_prcp
#   fire_hist   : log_gis_acres, fire_occurred
#   socioeconomic: poverty_rate, edu_rate, vacancy_rate, owner_rate, renter_rate,
#                  log_median_income, log_housing_value, income_to_housing,
#                  housing_cost_burden
#   composite   : vulnerability_index, premium_yoy_growth
#   temporal    : year_sin, year_cos, premium_rolling_mean

data:
  path: data/wildfire_engineered.csv
  time_steps: 3
  n_future: 1
  input_size: 20
  split: [0.70, 0.15, 0.15]
  log_target: false
  features:
    # insurance ratios
    - loss_ratio
    - claim_frequency
    - cat_share
    - log_earned_premium
    # fire risk
    - avg_fire_risk_score
    - high_risk_pct
    - risk_concentration
    # weather
    - drought_proxy
    - temp_range
    - heat_index
    - log_prcp
    # fire history
    - log_gis_acres
    - fire_occurred
    # socioeconomic
    - poverty_rate
    - edu_rate
    - log_median_income
    - vacancy_rate
    - housing_cost_burden
    # composite / temporal
    - vulnerability_index
    - year_sin
  target: earned_premium
