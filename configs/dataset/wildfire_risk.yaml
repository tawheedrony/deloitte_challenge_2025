# Dataset: wildfire_engineered — Task 1A: Wildfire Risk Regression
# Target : avg_fire_risk_score  (continuous 0–4 scale)
# Source : data/wildfire_engineered.csv
# Build  : python scripts/preprocess.py --engineered
#
# Uses 3 years of history (2018–2020) to predict the 2021 fire-risk score.
# Predicts avg_fire_risk_score as a proxy for 2023 wildfire risk when the
# model is given 2019–2022 data (once that data is available).
#
# Run:
#   python scripts/train.py --config configs/model/cQLSTM.yaml \
#                           --dataset configs/dataset/wildfire_risk.yaml

data:
  path: data/wildfire_engineered.csv
  task: regression          # SmoothL1Loss, RMSE/MAE/R² metrics
  time_steps: 3
  n_future: 1
  input_size: 15
  split: [0.70, 0.15, 0.15]
  log_target: false
  features:
    # fire risk (lagged signal)
    - avg_fire_risk_score
    # weather
    - avg_tmax_c
    - avg_tmin_c
    - tot_prcp_mm
    - temp_range
    - drought_proxy
    - log_prcp
    # fire history
    - log_gis_acres
    - fire_occurred
    # risk tier composition
    - high_risk_pct
    - risk_concentration
    # socioeconomic
    - total_population
    - poverty_rate
    - log_median_income
    # temporal
    - year_sin
  target: avg_fire_risk_score
