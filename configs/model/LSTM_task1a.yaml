# Task 1A — Wildfire Risk Regression (Classical Baseline)
# Model   : LSTM  (standard 4-gate recurrent network)
# Target  : avg_fire_risk_score  (continuous 0–4 scale)
# Dataset : data/wildfire_engineered.csv
#
# Use this alongside cQLSTM_task1a.yaml to satisfy Task 1B
# (quantum vs classical performance comparison).
#
# Usage:
#   python scripts/train.py --config configs/model/LSTM_task1a.yaml
#
# Compare with quantum model:
#   python scripts/eval.py \
#     --run "lightning_logs/LSTM_*/version_0" \
#     --run "lightning_logs/cQLSTM_*/version_0"

model:
  name: LSTM
  hidden_size: 64

data:
  path: data/wildfire_engineered.csv
  task: regression
  time_steps: 3
  n_future: 1
  input_size: 15
  split: [0.70, 0.15, 0.15]
  log_target: false
  features:
    - avg_fire_risk_score
    - avg_tmax_c
    - avg_tmin_c
    - tot_prcp_mm
    - temp_range
    - drought_proxy
    - log_prcp
    - log_gis_acres
    - fire_occurred
    - high_risk_pct
    - risk_concentration
    - total_population
    - poverty_rate
    - log_median_income
    - year_sin
  target: avg_fire_risk_score

training:
  seed: 42
  batch_size: 32
  max_epochs: 40
  lr: 2.0e-3
  weight_decay: 1.0e-4
  warmup_epochs: 3
  warmup_start_factor: 0.01
  early_stop_patience: 10

logging:
  log_dir: lightning_logs
  run_name: null
