_dataset: preprocessed   # → configs/dataset/preprocessed.yaml

model:
  name: QDeltaNet
  hidden_size: 64
  n_qubits: 4
  n_qlayers: 1
  n_esteps: 1
  neg_eigen: false
  chunk_size: 0

data:
  path: data/wildfire_preprocessed.csv
  time_steps: 3
  n_future: 1
  input_size: 9
  split: [0.70, 0.15, 0.15]
  log_target: false
  features:
    - avg_fire_risk_score
    - earned_exposure
    - cat_fire_losses
    - noncat_fire_losses
    - total_population
    - median_income
    - premium_rolling_mean
    - year_sin
    - year_cos
  target: earned_premium

training:
  seed: 42
  batch_size: 32
  max_epochs: 40
  lr: 2.0e-3
  weight_decay: 1.0e-4
  warmup_epochs: 3
  warmup_start_factor: 0.01
  early_stop_patience: 10

logging:
  log_dir: lightning_logs
  run_name: null
